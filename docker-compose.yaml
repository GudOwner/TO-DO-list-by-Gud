version: '3.8'

services:
  toDoList:
    image: postgres:15-alpine
    container_name: toDoList
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 01131
      POSTGRES_DB: to_do
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

volumes:
  pgdata: