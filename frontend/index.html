<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gud ToDo List</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background: #1e1e24; color: #fff; height: 100vh; overflow: hidden; }

        .sidebar { width: 60px; background: #111114; transition: width 0.3s; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; }
        .sidebar.open { width: 240px; align-items: flex-start; padding-left: 20px; }
        .burger-btn { cursor: pointer; font-size: 24px; background: none; border: none; color: #fff; }
        .menu-item { display: none; font-size: 18px; cursor: pointer; color: #a0a0a5; }
        .sidebar.open .menu-item { display: block; }
        .menu-item:hover { color: #57ffb4; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        h1 { margin-bottom: 20px; color: #57ffb4; font-size: 32px; display: flex; justify-content: space-between; align-items: center; }
        
        .logout-btn { font-size: 14px; background: none; border: 1px solid #ff5757; color: #ff5757; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .logout-btn:hover { background: #ff5757; color: #111; }

        .todo-form { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 6px; background: #2a2a32; color: #fff; font-size: 16px; }
        input:focus { outline: 2px solid #57ffb4; }
        button.add-btn { padding: 12px 24px; border: none; border-radius: 6px; background: #57ffb4; color: #111; font-weight: bold; cursor: pointer; font-size: 16px; }
        button.add-btn:hover { background: #3ddc97; }

        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #2a2a32; border-radius: 6px; border-left: 4px solid #57ffb4; }
        .task-item.completed { border-left-color: #555; opacity: 0.6; }
        .task-item.completed .task-text { text-decoration: line-through; color: #888; }
        .task-text { flex: 1; cursor: pointer; margin-right: 15px; }
        .delete-btn { background: none; border: none; color: #ff5757; cursor: pointer; font-size: 16px; }
        .delete-btn:hover { color: #ff3333; }

        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 17, 20, 0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-box { background: #2a2a32; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; border: 1px solid #3a3a44; }
        .auth-tabs { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #3a3a44; padding-bottom: 10px; }
        .auth-tab { cursor: pointer; color: #a0a0a5; font-size: 18px; font-weight: bold; }
        .auth-tab.active { color: #57ffb4; border-bottom: 2px solid #57ffb4; }
        .auth-form { display: flex; flex-direction: column; gap: 15px; }
        .auth-form.hidden { display: none; }
        .auth-form button { padding: 12px; border: none; border-radius: 6px; background: #57ffb4; color: #111; font-weight: bold; cursor: pointer; font-size: 16px; }
        .auth-form button:hover { background: #3ddc97; }
        .error-msg { color: #ff5757; font-size: 14px; min-height: 20px; }

        /* Адаптив для телефонов */
        @media (max-width: 600px) {
            .main-content { padding: 15px; }
            h1 { font-size: 24px; }
            .todo-form { flex-direction: column; }
            .auth-box { width: 95%; padding: 20px; }
            input, .add-btn { font-size: 18px !important; padding: 15px !important; }
        }
    </style>
</head>
<body>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <div class="auth-tabs">
                <span class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</span>
                <span class="auth-tab" id="tabRegister" onclick="switchTab('register')">Sign Up</span>
            </div>
            
            <form class="auth-form" id="loginForm" onsubmit="handleAuth(event, 'login')">
                <input type="text" placeholder="Username" required id="loginUser">
                <input type="password" placeholder="Password" required id="loginPass">
                <div class="error-msg" id="loginError"></div>
                <button type="submit">Login</button>
            </form>

            <form class="auth-form hidden" id="registerForm" onsubmit="handleAuth(event, 'register')">
                <input type="text" placeholder="Choose a username" required id="regUser">
                <input type="password" placeholder="Choose a password" required id="regPass">
                <div class="error-msg" id="regError"></div>
                <button type="submit">Register</button>
            </form>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="burger-btn" onclick="toggleSidebar()">☰</button>
        <div class="menu-item">📋 Tasks</div>
        <div class="menu-item">⚙️ Settings</div>
    </div>

    <div class="main-content">
        <div class="container">
            <h1>My tasks <button class="logout-btn" onclick="logout()">Logout</button></h1>
            <div class="todo-form">
                <input type="text" id="taskInput" placeholder="What to do?">
                <button class="add-btn" onclick="addTask()">Add</button>
            </div>
            <div class="task-list" id="taskList"></div>
        </div>
    </div>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function switchTab(type) {
            const isLogin = type === 'login';
            document.getElementById('tabLogin').classList.toggle('active', isLogin);
            document.getElementById('tabRegister').classList.toggle('active', !isLogin);
            document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
            document.getElementById('registerForm').classList.toggle('hidden', isLogin);
        }
        function getToken() { return localStorage.getItem('token'); }
        function logout() { localStorage.removeItem('token'); location.reload(); }

        async function handleAuth(event, type) {
            event.preventDefault();
            const isLogin = type === 'login';
            const username = document.getElementById(isLogin ? 'loginUser' : 'regUser').value;
            const password = document.getElementById(isLogin ? 'loginPass' : 'regPass').value;

            const res = await fetch(isLogin ? '/auth/login' : '/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            if (res.ok) {
                if (isLogin) {
                    localStorage.setItem('token', data.token);
                    document.getElementById('authOverlay').style.display = 'none';
                    loadTasks();
                } else {
                    alert('Success! Now sign in.');
                    switchTab('login');
                }
            } else { alert(data.error || 'Error'); }
        }

        async function loadTasks() {
            const token = getToken();
            if (!token) return;
            document.getElementById('authOverlay').style.display = 'none';

            const res = await fetch('/api/tasks', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 401) { logout(); return; }

            const tasks = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(t => {
                list.innerHTML += `<div class="task-item ${t.status ? 'completed' : ''}">
                    <span class="task-text" onclick="toggleTask(${t.id}, '${t.title}', ${t.status})">${t.title}</span>
                    <button class="delete-btn" onclick="deleteTask(${t.id})">❌</button>
                </div>`;
            });
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                body: JSON.stringify({ title: input.value, status: false })
            });
            input.value = '';
            loadTasks();
        }

        async function toggleTask(id, title, status) {
            await fetch(`/api/tasks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                body: JSON.stringify({ title: title, status: !status })
            });
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(`/api/tasks/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${getToken()}` } });
            loadTasks();
        }

        loadTasks();
    </script>
</body>
</html>
